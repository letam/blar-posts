<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>blar — neoselfy</title>
<meta name="description" content="the public record. everything neoselfy shipped through blar, newest first.">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="theme-color" content="#0a0a0b">
<style>
:root{
  --font: ui-monospace, "SF Mono", "JetBrains Mono", "Menlo", monospace;
  --bg:#0a0a0b; --panel:#141416; --line:#24242a;
  --fg:#e6e6e6; --dim:#6f6f78; --faint:#3a3a42;
  --acc:#4aa8ff; --acc-dim:#1f4e7a; --warn:#ff5c5c;   /* blar blue — same suite */
  --t-xl:2.25rem; --t-l:1.25rem; --t-m:1rem; --t-s:0.8125rem;
  --s1:4px; --s2:8px; --s3:16px; --s4:24px; --s5:48px;
  --radius:8px; --maxw:42rem;
}
*{ box-sizing:border-box; }
body{
  margin:0; background:var(--bg); color:var(--fg);
  font-family:var(--font); font-size:var(--t-m);
  text-transform:lowercase; line-height:1.7; letter-spacing:-0.01em;
  display:grid; place-items:start center; min-height:100dvh;
  padding:max(var(--s5), env(safe-area-inset-top)) var(--s3) var(--s5);
}
main{ width:100%; max-width:var(--maxw); }
a{ color:var(--acc); text-decoration:none; } a:hover{ text-decoration:underline; }
.bar{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:var(--s2); }
.mark{ font-size:var(--t-l); }
.tag{ font-size:var(--t-s); margin-bottom:var(--s5); }
.count{ color:var(--dim); }
.state{ color:var(--dim); margin:var(--s5) 0; }
.post{ border-top:1px solid var(--line); padding:var(--s5) 0; }
.post:first-of-type{ border-top:none; }
.pdate{ color:var(--dim); font-size:var(--t-s); margin-bottom:var(--s3); }
.body h1,.body h2,.body h3{ line-height:1.3; margin:var(--s4) 0 var(--s2); }
.body h1{ font-size:var(--t-l); } .body h2{ font-size:1.1rem; } .body h3{ font-size:var(--t-m); color:var(--dim); }
.body p{ margin:0 0 var(--s3); }
.body ul,.body ol{ margin:0 0 var(--s3) var(--s4); padding:0; }
.body li{ margin:var(--s1) 0; }
.body blockquote{ margin:0 0 var(--s3); padding-left:var(--s3); border-left:2px solid var(--acc-dim); color:var(--dim); }
.body code{ background:var(--panel); border:1px solid var(--line); border-radius:4px; padding:0 4px; font-size:.92em; }
.body hr{ border:none; border-top:1px solid var(--line); margin:var(--s4) 0; }
.foot{ margin-top:var(--s5); color:var(--faint); font-size:var(--t-s); }
</style>
</head>
<body>
<main>
  <header class="bar"><span class="mark">blar</span><span class="dim">neoselfy</span></header>
  <p class="tag dim">the public record — <span id="count" class="count"></span></p>
  <div id="state" class="state">loading what you shipped…</div>
  <div id="posts"></div>
  <footer class="foot">published straight from <a href="https://letam.github.io/blar/">blar</a>. no cms, no drafts, no backend. the folder is the page.</footer>
</main>
<script type="module">
const REPO = "letam/blar-posts";
const $ = s => document.querySelector(s);

// ── tiny dependency-free markdown → html (no cdn, no import — that's the doctrine) ──
const esc = s => s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
// escape FIRST (inside inline), then format — so raw `>` survives for blockquote detection below
function inline(s){
  return esc(s)
    .replace(/`([^`]+)`/g, (m,c)=>`<code>${c}</code>`)
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/(^|[^*])\*([^*\n]+)\*/g, "$1<em>$2</em>")
    .replace(/\[([^\]]+)\]\(([^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
}
function md(src){
  const lines = src.replace(/\r\n?/g,"\n").split("\n");   // raw — block detection needs unescaped `>`
  let html = "", i = 0;
  const isBlock = l => /^(#{1,6}\s|\s*>|\s*[-*]\s|\s*\d+\.\s|---+\s*$)/.test(l);
  while (i < lines.length){
    const line = lines[i];
    if (/^\s*$/.test(line)){ i++; continue; }
    if (/^---+\s*$/.test(line)){ html += "<hr>"; i++; continue; }
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h){ const n = h[1].length; html += `<h${n}>${inline(h[2])}</h${n}>`; i++; continue; }
    if (/^\s*>/.test(line)){ const b=[]; while(i<lines.length && /^\s*>/.test(lines[i])){ b.push(lines[i].replace(/^\s*>\s?/,"")); i++; } html += `<blockquote>${inline(b.join(" "))}</blockquote>`; continue; }
    if (/^\s*[-*]\s+/.test(line)){ const b=[]; while(i<lines.length && /^\s*[-*]\s+/.test(lines[i])){ b.push(`<li>${inline(lines[i].replace(/^\s*[-*]\s+/,""))}</li>`); i++; } html += `<ul>${b.join("")}</ul>`; continue; }
    if (/^\s*\d+\.\s+/.test(line)){ const b=[]; while(i<lines.length && /^\s*\d+\.\s+/.test(lines[i])){ b.push(`<li>${inline(lines[i].replace(/^\s*\d+\.\s+/,""))}</li>`); i++; } html += `<ol>${b.join("")}</ol>`; continue; }
    const b=[]; while(i<lines.length && !/^\s*$/.test(lines[i]) && !isBlock(lines[i])){ b.push(lines[i]); i++; }
    html += `<p>${b.map(inline).join("<br>")}</p>`;   // inline() escapes each line; <br> added after, so it survives
  }
  return html;
}

const DOW = ["sun","mon","tue","wed","thu","fri","sat"];
const MON = ["jan","feb","mar","apr","may","jun","jul","aug","sep","oct","nov","dec"];
function prettyDate(name){
  const m = name.match(/^(\d{4})-(\d{2})-(\d{2})/);
  if (!m) return name.replace(/\.md$/,"");
  const d = new Date(+m[1], +m[2]-1, +m[3]);
  return `${DOW[d.getDay()]} · ${MON[+m[2]-1]} ${+m[3]}, ${m[1]}`;
}

async function main(){
  let files;
  try {
    const r = await fetch(`https://api.github.com/repos/${REPO}/contents/posts`, { headers:{ "Accept":"application/vnd.github+json" }});
    if (!r.ok) throw new Error(r.status);
    files = (await r.json()).filter(f => f.name.endsWith(".md"));
  } catch(e){
    $("#state").textContent = "couldn't reach github right now. refresh in a minute.";
    return;
  }

  files.sort((a,b) => b.name.localeCompare(a.name));   // newest first
  $("#count").textContent = `${files.length} post${files.length===1?"":"s"}`;

  if (files.length === 0){
    $("#state").innerHTML = "nothing shipped yet. the first post is the whole point — <a href='https://letam.github.io/blar/'>go write one</a>.";
    return;
  }
  $("#state").remove();

  // fetch raw bodies in parallel (raw cdn, not the rate-limited api)
  const posts = await Promise.all(files.map(async f => {
    try { const t = await (await fetch(f.download_url)).text(); return { name:f.name, body:t }; }
    catch { return { name:f.name, body:"*(couldn't load this one)*" }; }
  }));

  const wrap = $("#posts");
  for (const p of posts){
    const el = document.createElement("article");
    el.className = "post"; el.id = `posts/${p.name}`;
    el.innerHTML = `<div class="pdate">${prettyDate(p.name)}</div><div class="body">${md(p.body)}</div>`;
    wrap.append(el);
  }
}
main();
</script>
</body>
</html>
